version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: api-monitor-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    networks:
      - api-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: api-monitor-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - api-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: api-monitor-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - api-net

  airflow-init:
    build: .                     
    image: api-usage-airflow:latest
    container_name: api-monitor-airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "1LhfuMYZiCqjbMMxFan-URmhqaPcT1p6NPGUJ0C853Q="
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    entrypoint: >
      bash -c "
      airflow db init &&
      airflow users create \
        --username admin \
        --firstname Admin \
        --lastname User \
        --role Admin \
        --email admin@example.org \
        --password admin || true
      "
    networks:
      - api-net

  airflow-webserver:
    image: api-usage-airflow:latest
    container_name: api-monitor-airflow-webserver
    depends_on:
      - airflow-init
      - postgres
      - kafka
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "1LhfuMYZiCqjbMMxFan-URmhqaPcT1p6NPGUJ0C853Q="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PROJECT_DIR: "/opt/api-usage-monitor"
      KAFKA_BOOTSTRAP: "kafka:9092"
    ports:
      - "8080:8080"
    command: bash -c "airflow webserver"
    networks:
      - api-net

  airflow-scheduler:
    image: api-usage-airflow:latest
    container_name: api-monitor-airflow-scheduler
    depends_on:
      - airflow-init
      - postgres
      - kafka
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "1LhfuMYZiCqjbMMxFan-URmhqaPcT1p6NPGUJ0C853Q="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PROJECT_DIR: "/opt/api-usage-monitor"
      KAFKA_BOOTSTRAP: "kafka:9092"
    command: bash -c "airflow scheduler"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./:/opt/api-usage-monitor
      - ./results:/opt/api-usage-monitor/results
    networks:
      - api-net

networks:
  api-net:
    driver: bridge
